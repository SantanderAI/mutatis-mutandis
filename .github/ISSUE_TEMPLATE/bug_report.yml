name: Bug report
description: Report a reproducible problem with mutatis-mutandis
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in the
        sections below — the more reproducibility info you provide, the
        faster we can help.

        > For security vulnerabilities, do NOT open a public issue. Follow
        > the process in [SECURITY.md](../blob/main/SECURITY.md).

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
      placeholder: When I run the law-school experiment, SituationTesting.run raises…
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands or code that trigger the issue.
      placeholder: |
        1. `pip install -e ".[dev]"`
        2. Run `python src/run_exp_law_school.py`
        3. See traceback
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour (incl. full traceback if any)
      render: shell
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true

  - type: input
    id: rversion
    attributes:
      label: R version (if the issue involves the R scripts)
      placeholder: "4.3.2"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have read the documentation in the README
          required: true
        - label: I agree to follow the project's Code of Conduct
          required: true
